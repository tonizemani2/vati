# protocol_v2.yaml — PRE-REGISTRATION, the CONCEPT-DISJOINT + POWERED detector experiment
#
# v1 (sealed `8067df5`, revealed) found a real but caveated edge: deflated p=0.013 on a TEMPORAL split
# whose select/test share persistent-winner concepts, on a small ~74-concept OpenAlex pool, not
# calibrated. v2 hardens BOTH weaknesses the honest way:
#   (1) CONCEPT-DISJOINT split — select and test share NO concepts (a frozen hash partition), so a
#       config tuned on the selection concepts cannot benefit from those same concepts persisting into
#       the test period. This is the clean answer to the v1 persistence caveat.
#   (2) POWER — the pool widens from ~74 OpenAlex concepts to ~193 (OpenAlex + 119 arXiv-category
#       works/year series built from the 1.48M-paper substrate), and origins go ANNUAL (2008–2021).
#
# HONEST PRIOR FINDING (logged, not hidden — surfaced while building v2): the detector's edge is
# GRAIN-DEPENDENT. On the fine OpenAlex concepts it lifts ~1.7×; on the COARSE arXiv categories alone
# it lifts ~0.8× (NO edge) — coarse categories are "themes", and a theme is not a needle. So the
# combined pool DILUTES the lift. v2 reports the per-provider breakdown so this is explicit. The test
# is therefore genuinely harder than v1, by design.
#
# The seal is the git commit of THIS file, which must predate the is_test_reveal=1 ledger row
# (protocol_version=2). Same frozen detector, same contamination-free / no-LLM-at-inference property.

protocol_version: 2
registered_at: 2026-06-05
author: ruben + claude (in-session)
supersedes_note: "v1 stays sealed+revealed; v2 is a NEW experiment (changed universe + split), not a re-open of v1."

hypothesis: >
  The frozen detector's firing predicts gain-of-cohort-share over the next 3 years on a CONCEPT-
  DISJOINT held-out set drawn from the combined OpenAlex + arXiv-category pool — i.e. the v1 edge is
  not an artifact of persistent winners shared across select/test, and survives on a 2.6x larger pool.

universe_rule:
  providers: [openalex, arxiv]        # arxiv = the 119 primary_category works/year series (papers substrate)
  metric: works_per_year
  draw: "median(sqrt(annual count)) >= k  AND  count(obs with year <= T) >= 8 (MIN_POINTS)"
  cohort: "(provider, metric, unit) — share is within-provider, so arXiv categories compete with arXiv, OpenAlex with OpenAlex"

label_rule: {kind: gain_share, margin: 1.5, window: 3, min_cohort: 5}

split:
  kind: concept_disjoint              # NOT temporal — select and test share zero concepts
  hash: "md5(salt + '|' + external_id), take first 8 hex digits as int, mod 3"
  salt: "v2-concept-disjoint-20260605"   # FRESH, never probed — preserves blindness of the reveal
  assignment: "bucket in {0,1} -> SELECT (~2/3) ; bucket == 2 -> TEST (~1/3), SEALED"
  origins: [2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021]
  note: "every concept is forecast at every eligible annual origin; de-clustered to its earliest origin"

search_space: {k: [2.5, 3.0, 3.5], gain_margin: [1.3, 1.5, 2.0], channels: [count, count+diffusion, count+diffusion+talent]}
n_configs_declared: 27
primary_metric: lift_declustered      # on the TEST (held-out) concepts
secondary_metrics: [lift_pooled, recall, brier_loco, p_block, lift_ci, per_provider_lift]
null: block_permutation
stopping_rule: >
  Run the search space on the SELECT concepts (all annual origins); promote argmax SELECT
  lift_declustered (tie -> larger k). Reveal ONCE on the TEST concepts. The deflated block-permutation
  p (x27) is the headline. A null is a real result; further iteration needs protocol_v3.
seed: 20260605
